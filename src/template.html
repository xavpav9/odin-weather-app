<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
  </head>

  <body>
    <div class="options">
      <h1>Weather App</h1>
      <form method="" action="">
        <div class="location">
          <label for="temp-type">Location: </label>
          <input type="text" name="location" id="location">
        </div>
        <div class="buttons">
          <button class="submit">Submit</button>
        </div>
        <div class="temp-type">
          <label for="temp-type">Temperature Type: </label>
          <select name="temp-type" id="temp-type">
            <option value="fahrenheit">Fahrenheit</option>
            <option value="celsius">Celsius</option>
          </select>
        </div>
      </form>
    </div>
    <div class="day-scroller">
      <div>
      </div>
    </div>
    <div class="now">
    </div>
    <div class="selected-day">
      <div>
        <div class="hours">
          <div class="am-hours">
          </div>
          <div class="pm-hours">
          </div>
        </div>
        <div class="hour-info">
        </div>
      </div>
    </div>
  </body>
</html>
